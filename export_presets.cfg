html/head_include="<meta name='apple-mobile-web-app-capable' content='yes'><meta name='mobile-web-app-capable' content='yes'><style>#sb-rot{display:none;position:fixed;inset:0;z-index:99999;background:#0b0a12;align-items:center;justify-content:center;font-family:sans-serif}#sb-rot .b{display:flex;flex-direction:column;gap:16px;align-items:center;text-align:center}#sb-rot .ic{font-size:64px;animation:sbsp 1.6s ease-in-out infinite}@keyframes sbsp{0%,100%{transform:rotate(0)}50%{transform:rotate(-90deg)}}</style><script>(function(){var o;function mk(){o=document.createElement('div');o.id='sb-rot';o.innerHTML='<div class=b><div class=ic>📱</div><div style=font-size:20px;font-weight:700;color:#cbb6ff>가로로 돌려주세요</div><div style=font-size:13px;opacity:.7;color:#9a90b8>SOULBINDER는 가로 화면 게임입니다</div></div>';document.body.appendChild(o);}function ck(){if(o)o.style.display=(window.innerHeight>window.innerWidth)?'flex':'none';}function lk(){try{var d=document.documentElement;if(d.requestFullscreen){d.requestFullscreen().then(function(){if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){});}).catch(function(){});}else if(screen.orientation&&screen.orientation.lock){screen.orientation.lock('landscape').catch(function(){});}}catch(e){}}window.addEventListener('load',function(){mk();ck();});window.addEventListener('resize',ck);window.addEventListener('orientationchange',function(){setTimeout(ck,200);});window.addEventListener('touchend',function(){lk();},{once:true});window.addEventListener('click',function(){lk();},{once:true});})();</script>"
